# Gitea Actions — 自动构建部署
# 触发条件：main 分支有 push（Gitea 从 GitHub 镜像同步也算 push）
#
# 使用方式：
# 1. 服务器上手动 clone 一份到固定路径：
#    git clone http://localhost:3001/用户名/仓库.git C:\stockscape
# 2. 在 Gitea 仓库 Settings → Actions → Secrets 里配置：
#    DEPLOY_PATH = C:\stockscape
#
# 之后每次 GitHub push → Gitea 同步 → 自动 pull + 重新构建部署

name: Deploy StockScape

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: windows-latest
    steps:
      - name: Pull latest code
        shell: powershell
        run: |
          cd ${{ secrets.DEPLOY_PATH }}
          git fetch --all
          git reset --hard origin/main
          Write-Host "代码已更新"

      - name: Build and Deploy
        shell: powershell
        run: |
          cd ${{ secrets.DEPLOY_PATH }}
          Write-Host "开始构建和部署..."
          docker compose down --remove-orphans
          if ($LASTEXITCODE -ne 0) { Write-Host "没有旧容器需要清理" }
          docker compose up -d --build
          Write-Host "部署完成"

      - name: Health check
        shell: powershell
        run: |
          Write-Host "等待服务启动..."
          Start-Sleep -Seconds 20
          try { Invoke-WebRequest -Uri http://localhost:8000/api/v1/health -UseBasicParsing; Write-Host "后端正常" } catch { Write-Host "后端异常" }
          try { Invoke-WebRequest -Uri http://localhost:8001 -UseBasicParsing; Write-Host "前端正常" } catch { Write-Host "前端异常" }
